# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - 校園物品借用

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      # 1. 處理 client (前端)
      - name: Build Client
        working-directory: ./client
        run: |
          npm install
          npm run build
          
      # 2. 處理 server (後端)
      - name: Build Server
        working-directory: ./server
        run: |
          npm install
          # 如果 server 需要 build 指令，請保留下面這行；若不需要則刪除
          npm run build --if-present 

      # 3. 把 client build 好的檔案移進 server 目錄，讓 Azure 一次打包
      - name: Prepare Deployment Files
        run: |
          mkdir -p ./server/public
          cp -r ./client/build/* ./server/public/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: ./server

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_AEA4446C0AE94C51BBFAB4B3363D116A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_F8F27B76F14B48728BFE8330A0768130 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F660F12CDD134FEA9F91F87DB965D36D }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: '校園物品借用'
          slot-name: 'Production'
          package: .
          
